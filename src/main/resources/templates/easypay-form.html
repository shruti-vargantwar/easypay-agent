<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Easy Pay Recovery Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            background: #f4f7fb;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 36px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1565C0;
            border-bottom: 2px solid #1565C0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        p {
            color: #555;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #90CAF9;
            border-radius: 4px;
            margin-bottom: 24px;
            background: #f0f7ff;
            color: #333;
        }
        select:focus {
            outline: none;
            border-color: #1565C0;
        }
        button {
            background-color: #1565C0;
            color: white;
            padding: 12px 28px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0D47A1;
        }
        .subtitle {
            font-size: 0.85em;
            color: #888;
            margin-top: -16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Easy Pay Recovery Agent</h1>
    <p>Select a customer scenario to evaluate a failed Easy Pay installment payment.</p>

    <form th:action="@{/easypay-agent}" method="post">
        <label>Select Customer Scenario</label>
        <select name="customerId">
            <option value="A">Customer A -- Loyal (8 years, 45 purchases, 0 prior declines) -- $400 Dyson Vacuum</option>
            <option value="B">Customer B -- Suspicious (0 years, 3 purchases, 2 prior declines) -- $1,200 MacBook Pro</option>
            <option value="C">Customer C -- Medium Risk (2 years, 10 purchases, 1 prior decline) -- $250 KitchenAid Mixer</option>
            <option value="D">Customer D -- VIP (15 years, 120 purchases, 0 prior declines) -- $800 Samsung TV</option>
            <option value="E">Customer E -- New High Value (0 years, 2 purchases, 1 prior decline) -- $1,500 Diamond Bracelet</option>
        </select>
        <p class="subtitle">Claude will evaluate the profile and call the appropriate tool.</p>
        <button type="submit">Run Agent</button>
    </form>
</div>
</body>
</html>

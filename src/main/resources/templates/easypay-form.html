<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Easy Pay Recovery Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            background: #f4f7fb;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 36px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1565C0;
            border-bottom: 2px solid #1565C0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        p {
            color: #555;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #90CAF9;
            border-radius: 4px;
            margin-bottom: 24px;
            background: #f0f7ff;
            color: #333;
        }
        select:focus {
            outline: none;
            border-color: #1565C0;
        }
        button {
            background-color: #1565C0;
            color: white;
            padding: 12px 28px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0D47A1;
        }
        button:disabled {
            background-color: #90CAF9;
            cursor: not-allowed;
        }
        .subtitle {
            font-size: 0.85em;
            color: #888;
            margin-top: -16px;
            margin-bottom: 20px;
        }
        .loading {
            display: none;
            margin-top: 24px;
        }
        .loading-text {
            color: #1565C0;
            font-size: 0.95em;
            margin-bottom: 10px;
        }
        .progress-bar-track {
            width: 100%;
            background: #e3f2fd;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 8px;
            width: 0%;
            background: #1565C0;
            border-radius: 4px;
            animation: fillBar 8s ease-in-out forwards;
        }
        @keyframes fillBar {
            0%   { width: 0%; }
            60%  { width: 75%; }
            90%  { width: 90%; }
            100% { width: 95%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Easy Pay Recovery Agent</h1>
    <p>Select a customer scenario to evaluate a failed Easy Pay installment payment.</p>

    <form th:action="@{/easypay-agent}" method="post" id="agentForm">
        <label>Select Customer Scenario</label>
        <select name="customerId">
            <option value="A">Customer A -- Loyal (8 years, 45 purchases, 0 prior declines) -- $400 Dyson Vacuum</option>
            <option value="B">Customer B -- Suspicious (0 years, 3 purchases, 2 prior declines) -- $1,200 MacBook Pro</option>
            <option value="C">Customer C -- Medium Risk (2 years, 10 purchases, 1 prior decline) -- $250 KitchenAid Mixer</option>
            <option value="D">Customer D -- VIP (15 years, 120 purchases, 0 prior declines) -- $800 Samsung TV</option>
            <option value="E">Customer E -- New High Value (0 years, 2 purchases, 1 prior decline) -- $1,500 Diamond Bracelet</option>
        </select>
        <p class="subtitle">Claude will evaluate the profile and call the appropriate tool.</p>
        <button type="submit" id="submitBtn">Run Agent</button>
    </form>

    <div class="loading" id="loadingSection">
        <p class="loading-text">Claude is evaluating the customer profile and selecting the appropriate action...</p>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('agentForm').addEventListener('submit', function() {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = 'Running...';
        document.getElementById('loadingSection').style.display = 'block';
    });
</script>
</body>
</html>
